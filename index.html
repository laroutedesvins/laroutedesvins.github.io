<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Route des Vins | Bar Tabac Belleville</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
}

header {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(0,0,0,0.6);
  padding: 15px;
  text-align: center;
  z-index: 100;
}

header a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

.hero {
  height: 100vh;
  background: url('hero.png') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero-overlay {
  background: rgba(0,0,0,0.5);
  padding: 40px;
  border-radius: 10px;
}

.logo {
  max-width: 280px;
  margin-bottom: 20px;
}

h1 {
  font-size: 42px;
  margin: 10px 0;
}

.subtitle {
  font-size: 18px;
  opacity: 0.8;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: #c94b2c;
  color: white;
  border-radius: 5px;
  text-decoration: none;
}

.section {
  padding: 80px 20px;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  max-width: 900px;
  margin: auto;
}

.grid img {
  width: 100%;
  border-radius: 12px;
}
</style>
</head>

<body>

<header>
  <a href="#bar">Bar</a>
  <a href="#tabac">Tabac</a>
  <a href="#infos">Infos</a>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-overlay">

    <img src="logo-bar.png" class="logo">

    <h1>La Route des Vins</h1>

    <div class="subtitle">
      Bar • Tabac • FDJ<br>
      Belleville-en-Beaujolais
    </div>

    <a class="btn" href="tel:+33474663468">📞 Appeler</a>

  </div>
</div>

<!-- BAR -->
<div id="bar" class="section">
  <h2>Le Bar</h2>
  <div class="grid">
    <img src="bar1.png">
    <img src="bar2.png">
  </div>
</div>

<!-- TABAC -->
<div id="tabac" class="section">
  <h2>Tabac • Presse • FDJ</h2>
  <div class="grid">
    <img src="tabac1.png">
    <img src="tabac2.png">
  </div>
</div>

<!-- INFOS -->
<div id="infos" class="section">
  <h2>Infos pratiques</h2>
  <p>
    📍 1 place de la gare<br>
    69220 Belleville-en-Beaujolais
  </p>

  <p>
    🕒 Bar<br>
    Lundi – Vendredi : 6h15 – 20h<br>
    Mercredi : fermé<br>
    Samedi : 7h15 – 20h<br>
    Dimanche : 7h15 – 14h
  </p>
</div>

</body>
</html>
